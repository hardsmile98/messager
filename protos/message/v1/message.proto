syntax = "proto3";

package message.v1;

import "protos/common/v1/common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "sdk/message/v1;messagev1";

service MessageService {
    rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
    rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse); 
    rpc MarkAsRead(MarkAsReadRequest) returns (google.protobuf.Empty);
}

message SendMessageRequest {
    string chat_id = 1;
    string sender_id = 2;
    string content = 3;
}

message SendMessageResponse {
    string message_id = 1;
    google.protobuf.Timestamp created_at = 2;
}

message GetMessagesRequest {
    string chat_id = 1;
    int32 limit = 2;
    string cursor = 3;
}
  
message GetMessagesResponse {
    repeated common.v1.Message messages = 1;
    string next_cursor = 2;
}
  
message MarkAsReadRequest {
    string user_id = 1;
    string chat_id = 2;
    string last_read_msg_id = 3;
}