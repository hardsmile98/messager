syntax = "proto3";

package chat.v1;

import "protos/common/v1/common.proto";

option go_package = "github.com/hardsmile98/messager/sdk/chat/v1;chatv1";

service ChatService {
    rpc CreatePrivateChat(CreatePrivateChatRequest) returns (common.v1.Chat);
    rpc GetUserChats(GetUserChatsRequest) returns (GetUserChatsResponse);
    rpc GetChatInfo(GetChatInfoRequest) returns (common.v1.ChatInfo);
  }
  
  message CreatePrivateChatRequest {
    string initiator_id = 1;
    string target_user_id = 2;
  }
  
  message GetUserChatsRequest {
    string user_id = 1;
  }
  
  message GetUserChatsResponse {
    repeated common.v1.ChatInfo chats = 1;
  }
  
  message GetChatInfoRequest {
    string chat_id = 1;
    string user_id = 2;
  }